<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotionCutAI</title>
    <!-- Modern bold font for the UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Titlebar for electron -->
    <div id="titlebar">MotionCutAI</div>

    <div id="app-container">
      <!-- Top Section -->
      <div id="top-section">
        <!-- 3D Canvas Container -->
        <div id="viewport-container">
          <div id="fps-counter">60 FPS</div>
          <!-- Three.js will inject canvas here -->
        </div>

        <!-- Properties Panel -->
        <div id="properties-panel">
          <div class="panel-header">Properties</div>
          <div class="panel-content">
            <div class="prop-group">
              <label>Scene Text</label>
              <input type="text" id="scene-text-input" value="LUMINOUS" />
            </div>
            <div class="prop-group">
              <label>Text Color</label>
              <input type="color" id="scene-text-color" value="#E5B55A" style="width: 100%; height: 32px; border: none; border-radius: 4px; padding: 0; background: none; cursor: pointer;" />
            </div>
            <div class="prop-group">
              <label>Spotlight Intensity</label>
              <input type="range" id="bloom-strength" min="0" max="3" step="0.1" value="1.5" />
            </div>
            
            <div id="ai-prompt-container">
              <label><i data-lucide="sparkles"></i> AI Script Generator</label>
              <textarea id="ai-prompt-input" placeholder="Type your ad script (e.g. 'Camera zooms to keyboard, then text Titanium drops in')"></textarea>
              <button id="btn-auto-gen" class="action-btn primary magic-btn">✨ Generate Video</button>
            </div>
          </div>
          
          <div class="panel-footer">
            <button id="btn-export" class="action-btn secondary">Export Video</button>
          </div>
        </div>
      </div>

      <!-- Bottom Timeline Section -->
      <div id="timeline-section">
        <div id="timeline-header">
          <div class="tools">
            <button id="btn-play">▶ Play</button>
            <span id="timecode">00:00:00:00</span>
          </div>
        </div>
        <div id="timeline-tracks">
          <!-- Left track labels -->
          <div id="track-labels">
            <div class="track-label camera"><i data-lucide="camera"></i> Camera Flow</div>
            <div class="track-label text"><i data-lucide="type"></i> Typography</div>
            <div class="track-label model"><i data-lucide="box"></i> 3D Objects</div>
            <div class="track-label sfx"><i data-lucide="volume-2"></i> SFX</div>
          </div>
          <!-- Right track area -->
          <div id="track-area">
            <div id="playhead"></div>
            <!-- Example blocks will be added dynamically by GSAP/Timeline JS -->
            <div class="track" data-type="camera"></div>
            <div class="track" data-type="text"></div>
            <div class="track" data-type="model"></div>
            <div class="track" data-type="sfx"></div>
          </div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
