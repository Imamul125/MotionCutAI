<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotionCutAI</title>
    <!-- Modern bold font for the UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Titlebar for electron -->
    <div id="titlebar">MotionCutAI</div>

    <div id="app-container">
      <!-- Top Section -->
      <div id="top-section">
        <!-- 3D Canvas Container -->
        <div id="viewport-container">
          <div id="fps-counter">60 FPS</div>
          <!-- Three.js will inject canvas here -->
        </div>

        <div id="properties-panel">
          <div class="panel-header">Properties</div>
          <div class="panel-content">

            <!-- Scene Hierarchy -->
            <div class="scene-hierarchy">
              <div class="scene-hierarchy-header">
                <span>🎬 Scene Objects</span>
              </div>
              <div id="scene-objects-list" class="scene-objects-list">
                <!-- Filled dynamically -->
              </div>
              <!-- ALL add buttons in one place -->
              <div class="scene-add-bar-grid">
                <button id="btn-add-text" class="scene-add-btn" title="Add 3D Text">
                  <span class="add-btn-icon">T</span><span class="add-btn-label">Text</span>
                </button>
                <button id="btn-add-cube" class="scene-add-btn" title="Add Cube">
                  <span class="add-btn-icon">▢</span><span class="add-btn-label">Cube</span>
                </button>
                <button id="btn-add-sphere" class="scene-add-btn" title="Add Sphere">
                  <span class="add-btn-icon">●</span><span class="add-btn-label">Sphere</span>
                </button>
                <button id="btn-import-image" class="scene-add-btn" title="Add Image">
                  <span class="add-btn-icon">🖼</span><span class="add-btn-label">Image</span>
                </button>
                <button id="btn-import-video" class="scene-add-btn" title="Add Video">
                  <span class="add-btn-icon">🎬</span><span class="add-btn-label">Video</span>
                </button>
                <button id="btn-import-model" class="scene-add-btn" title="Import 3D Model">
                  <span class="add-btn-icon">📂</span><span class="add-btn-label">3D File</span>
                </button>
                <button id="btn-add-point-light" class="scene-add-btn" title="Point Light">
                  <span class="add-btn-icon">💡</span><span class="add-btn-label">Point</span>
                </button>
                <button id="btn-add-spot-light" class="scene-add-btn" title="Spot Light">
                  <span class="add-btn-icon">🔦</span><span class="add-btn-label">Spot</span>
                </button>
                <button id="btn-add-dir-light" class="scene-add-btn" title="Sun Light">
                  <span class="add-btn-icon">☀️</span><span class="add-btn-label">Sun</span>
                </button>
              </div>
              <input type="file" id="file-import-model" accept=".glb,.gltf" style="display:none;" />
              <input type="file" id="file-import-image" accept="image/*" style="display:none;" />
              <input type="file" id="file-import-video" accept="video/*" style="display:none;" />
            </div>

            <!-- Selected Object Properties -->
            <div id="selected-obj-props" class="selected-obj-props">
              <div class="prop-group">
                <label>Name</label>
                <input type="text" id="obj-name-input" value="" placeholder="Object name" />
              </div>
              <div class="prop-group" id="obj-text-group" style="display:none;">
                <label>Text Content</label>
                <input type="text" id="obj-text-content" value="" />
              </div>
              <div class="prop-group" id="obj-color-group">
                <label>Color</label>
                <input type="color" id="obj-color" value="#E5B55A" style="width:100%;height:24px;border:none;border-radius:4px;padding:0;background:none;cursor:pointer;" />
              </div>
            </div>

            <!-- Light Properties (shown when light is selected) -->
            <div id="light-props" class="light-props" style="display:none;">
              <div class="prop-group">
                <label>💡 Light Intensity</label>
                <input type="range" id="light-intensity" min="0" max="500" step="5" value="150" />
              </div>
              <div class="prop-group">
                <label>Light Color</label>
                <input type="color" id="light-color" value="#ffffff" style="width:100%;height:24px;border:none;border-radius:4px;padding:0;background:none;cursor:pointer;" />
              </div>
            </div>

            <!-- Transform Section -->
            <div id="transform-section" class="transform-section">
              <div class="transform-header">
                <span class="transform-icon">⊞</span>
                <span id="transform-label">Transform — <em id="transform-track-name">None</em></span>
              </div>
              <div class="transform-row">
                <label>Position</label>
                <div class="xyz-inputs">
                  <div class="xyz-field">
                    <span class="xyz-label x" data-target="transform-pos-x">X</span>
                    <input type="number" id="transform-pos-x" step="0.5" value="0" />
                  </div>
                  <div class="xyz-field">
                    <span class="xyz-label y" data-target="transform-pos-y">Y</span>
                    <input type="number" id="transform-pos-y" step="0.5" value="0" />
                  </div>
                  <div class="xyz-field">
                    <span class="xyz-label z" data-target="transform-pos-z">Z</span>
                    <input type="number" id="transform-pos-z" step="0.5" value="0" />
                  </div>
                </div>
              </div>
              <div class="transform-row">
                <label>Scale</label>
                <div class="xyz-inputs">
                  <div class="xyz-field full">
                    <span class="xyz-label s" data-target="transform-scale">S</span>
                    <input type="number" id="transform-scale" step="0.1" value="1" min="0.1" />
                  </div>
                </div>
              </div>
              <div class="transform-hint">
                Drag <kbd>X</kbd><kbd>Y</kbd><kbd>Z</kbd> labels to adjust • Press <kbd>K</kbd> to keyframe
              </div>
            </div>

            <!-- Environment Lighting (compact) -->
            <div class="env-section">
              <div class="env-header">🌍 Environment</div>
              <div class="env-compact-row">
                <select id="env-preset">
                  <option value="">None (Dark)</option>
                  <option value="https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr">Studio</option>
                  <option value="https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/kloppenheim_02_1k.hdr">Sunset</option>
                  <option value="https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/moonless_golf_1k.hdr">Night</option>
                  <option value="https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/quarry_01_1k.hdr">Outdoor</option>
                </select>
                <button id="btn-import-hdr" class="env-import-btn" title="Import .hdr file">📁</button>
                <input type="file" id="file-import-hdr" accept=".hdr" style="display:none;" />
              </div>
              <div class="env-compact-row">
                <input type="range" id="env-intensity" min="0" max="3" step="0.05" value="1" style="flex:1;" />
                <label class="toggle-label">
                  <input type="checkbox" id="env-show-bg" />
                  <span>BG</span>
                </label>
                <label class="toggle-label">
                  <input type="checkbox" id="toggle-gizmos" checked />
                  <span>Gizmos</span>
                </label>
              </div>
            </div>

            <div id="ai-prompt-container">
              <label><i data-lucide="sparkles"></i> AI Script Generator</label>
              <textarea id="ai-prompt-input" placeholder="Type your ad script (e.g. 'Camera zooms to keyboard, then text drops in')"></textarea>
              <button id="btn-auto-gen" class="action-btn primary magic-btn">✨ Generate Video</button>
            </div>
          </div>
          
          <div class="panel-footer">
            <button id="btn-export" class="action-btn secondary">Export Video</button>
          </div>
        </div>
      </div>

      <!-- Bottom Timeline Section -->
      <div id="timeline-section">
        <div id="timeline-header">
          <div class="tools">
            <button id="btn-play">▶ Play</button>
            <span id="timecode">00:00:00:00</span>
          </div>
        </div>
        <div id="timeline-tracks">
          <!-- Left track labels -->
          <div id="track-labels">
            <div class="track-label camera"><i data-lucide="camera"></i> Camera Flow</div>
            <div class="track-label text"><i data-lucide="type"></i> Typography</div>
            <div class="track-label model"><i data-lucide="box"></i> 3D Objects</div>
            <div class="track-label sfx"><i data-lucide="volume-2"></i> SFX</div>
          </div>
          <!-- Right track area -->
          <div id="track-area">
            <div id="playhead"></div>
            <!-- Example blocks will be added dynamically by GSAP/Timeline JS -->
            <div class="track" data-type="camera"></div>
            <div class="track" data-type="text"></div>
            <div class="track" data-type="model"></div>
            <div class="track" data-type="sfx"></div>
          </div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
